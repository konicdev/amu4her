<!-- Hero -->
<section class="px-6 py-16 bg-pink-50 text-center">

<!-- Blog Grid -->

  <div id="blog-grid" class="max-w-6xl mx-auto grid md:grid-cols-2 lg:grid-cols-3 gap-8">

</footer>

<script>
const PROJECT_ID = "s5tm8bhe";
const DATASET = "production";

// build image url
function urlFor(source) {
  if (!source?._ref) return "";
  const [id, dims, format] = source._ref.split('-').slice(1);
  return `https://cdn.sanity.io/images/${PROJECT_ID}/${DATASET}/${id}-${dims}.${format}`;
}

let ALL_POSTS = [];

async function loadBlogs() {
  const container = document.getElementById("blog-grid");

  try {
    const query = encodeURIComponent(`*[_type=="post"] | order(publishedAt desc){
      title,
      slug,
      publishedAt,
      description,
      image,
      author->{name}
    }`);

    const url = `https://${PROJECT_ID}.api.sanity.io/v1/data/query/${DATASET}?query=${query}`;
    const res = await fetch(url);

    const data = await res.json();
    ALL_POSTS = data.result;

    renderBlogs(ALL_POSTS);

  } catch (err) {
    console.error(err);
    container.innerHTML = `<p class="text-red-500">Failed to load blogs</p>`;
  }
}

function renderBlogs(posts) {
  const container = document.getElementById("blog-grid");

  if (!posts.length) {
    container.innerHTML = `<p class="text-gray-500">No blogs found.</p>`;
    return;
  }

  container.innerHTML = posts.map(post => `
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden hover:shadow-lg transition">

      ${post.image ? `
        <img src="${urlFor(post.image)}" class="w-full h-48 object-cover"/>
      ` : ""}

      <div class="p-6 space-y-3">
        <h3 class="text-xl font-semibold text-pink-700">
          <a href="/blog?id=${post.slug.current}" class="hover:underline">
            ${post.title}
          </a>
        </h3>

        <p class="text-sm text-gray-500">
          By ${post.author?.name || "Unknown"} • 
          ${new Date(post.publishedAt).toLocaleDateString()}
        </p>

        <p class="text-gray-700 text-sm">
          ${post.description || ""}
        </p>

        <a href="/blog?id=${post.slug.current}" 
           class="inline-block text-pink-600 font-medium hover:underline">
          Read more →
        </a>
      </div>

    </div>
  `).join("");
}

// search filter
document.getElementById("searchInput").addEventListener("input", (e) => {
  const term = e.target.value.toLowerCase();

  const filtered = ALL_POSTS.filter(post =>
    post.title.toLowerCase().includes(term) ||
    (post.description || "").toLowerCase().includes(term)
  );

  renderBlogs(filtered);
});

loadBlogs();
</script>
