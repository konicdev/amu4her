 <!-- Header -->

</div>

      <!-- Navigation -->
      <nav class="mt-4 md:mt-0 flex items-center space-x-6 text-lg text-pink-700 font-medium relative">

        <!-- ABOUT Dropdown -->
        <div class="relative group">
          <a  class="hover:underline flex items-center gap-1">

            <svg class="w-4 h-4 transform transition-transform group-hover:rotate-180"

<!-- Author Content -->
<section class="px-12 py-14 bg-pink-50 min-h-screen max-w-6xl mx-auto">
  <div class="bg-white rounded-xl shadow-md p-10">
    <div id="author-container" class="space-y-6">
      <p class="text-gray-500 italic">Loading author...</p>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="bg-blue-100 text-center text-sm text-gray-600 p-4 mt-10 flex justify-center items-center gap-2">
  <p>&copy; 2025 Amu4her. Built with</p>
  <i class="fas fa-heart text-pink-600 text-sm"></i>
</footer>

<script>
const PROJECT_ID = "s5tm8bhe";
const DATASET = "production";

// image builder
function urlFor(source) {
  if (!source) return "../images/default-author.png";

  const ref = source._ref || source.asset?._ref || source._id;
  if (!ref) return "../images/default-author.png";

  const parts = ref.split("-");
  if (parts.length < 4) return "../images/default-author.png";

  const id = parts[1];
  const dims = parts[2];
  const format = parts[3];

  return `https://cdn.sanity.io/images/${PROJECT_ID}/${DATASET}/${id}-${dims}.${format}`;
}

async function loadAuthorPage() {
  const params = new URLSearchParams(window.location.search);
  const authorSlug = params.get("id");
  const container = document.getElementById("author-container");

  if (!authorSlug) {
    container.innerHTML = `<p class="text-red-500">No author specified.</p>`;
    return;
  }

  try {
    const query = encodeURIComponent(`*[_type=="author" && slug.current=="${authorSlug}"][0]{
      _id,
      name,
      slug,
      photo,
      bio,
      age,
      grade,
      interests,
      socials,
      "blogs": *[_type=="post" && author._ref==^._id]{
        title,
        slug,
        publishedAt
      }
    }`);

    const url = `https://${PROJECT_ID}.api.sanity.io/v1/data/query/${DATASET}?query=${query}`;
    const res = await fetch(url);
    const data = await res.json();
    const author = data.result;

    if (!author) throw new Error("Author not found.");

    const photoHTML = `
      <div class="flex-shrink-0">
        <img 
          src="${urlFor(author.photo)}" 
          alt="${author.name}"
          class="w-40 h-auto object-contain rounded-xl shadow-md border border-pink-300"
          onerror="this.src='../images/default-author.png'"
        />
      </div>
    `;

    let html = `
      <div class="flex flex-col md:flex-row items-center gap-10">
        ${photoHTML}
        <div class="flex-1">
          <h1 class="text-4xl font-bold text-pink-700">${author.name}</h1>
          <p class="text-gray-500 mt-1">
            ${author.age ? `Age ${author.age} • ` : ""}${author.grade ? `Grade ${author.grade}` : ""}
          </p>
          <p class="text-gray-700 mt-4 leading-relaxed">${author.bio || ""}</p>

          ${author.interests?.length 
            ? `<p class="mt-3 text-sm text-gray-600"><strong>Interests:</strong> ${author.interests.join(", ")}</p>` 
            : ""}

          ${author.socials?.instagram 
            ? `<p class="mt-4"><a href="${author.socials.instagram}" target="_blank" class="text-pink-600 underline hover:text-pink-800">Instagram</a></p>` 
            : ""}
        </div>
      </div>

      <div class="border-t border-gray-200 pt-10 mt-10">
        <h2 class="text-2xl font-semibold text-gray-900">Posts by ${author.name}</h2>
        <div class="mt-6 grid gap-6 md:grid-cols-2">
    `;

    if (author.blogs?.length) {
      html += author.blogs.map(blog => `
        <div class="border border-gray-200 rounded-lg p-6 hover:shadow-lg transition">
          <h3 class="text-xl font-semibold text-pink-700">
            <a href="/blog?id=${blog.slug.current}" class="hover:underline">
              ${blog.title}
            </a>
          </h3>
          <p class="text-sm text-gray-500 mt-1">
            ${new Date(blog.publishedAt).toLocaleDateString()}
          </p>
        </div>
      `).join("");
    } else {
      html += `<p class="text-gray-500 mt-4 italic">No posts yet.</p>`;
    }

    html += `</div></div>`;
    container.innerHTML = html;

  } catch (err) {
    console.error(err);
    container.innerHTML = `<p class="text-red-500">Error loading author: ${err.message}</p>`;
  }
}

loadAuthorPage();
</script>
</body>
</html>
