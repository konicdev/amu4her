<!-- Blog Content -->
<section class="px-12 py-14 bg-pink-50 min-h-screen max-w-6xl mx-auto">
  <div class="bg-white rounded-xl shadow-md p-10">
    <div id="blog-container" class="space-y-6">

    </div>

</section>

<!-- Footer -->

<i class="fas fa-heart text-pink-600 text-sm"></i>
</footer>

<script>
const PROJECT_ID = "s5tm8bhe";
const DATASET = "production";

// Image builder function
function urlFor(source) {
  if (!source) return "../images/default-blog.png";

  const ref = source._ref || source.asset?._ref || source._id;
  if (!ref) return "../images/default-blog.png";

  const parts = ref.split("-");
  if (parts.length < 4) return "../images/default-blog.png";

  const id = parts[1];
  const dims = parts[2];
  const format = parts[3];

  return `https://cdn.sanity.io/images/${PROJECT_ID}/${DATASET}/${id}-${dims}.${format}`;
}

async function loadBlogPost() {
  const params = new URLSearchParams(window.location.search);
  const blogSlug = params.get("id");
  const container = document.getElementById("blog-container");

  if (!blogSlug) {
    container.innerHTML = `<p class="text-red-500">No blog ID specified.</p>`;
    return;
  }

  try {
    const query = encodeURIComponent(`*[_type=="post" && slug.current=="${blogSlug}"][0]{
      title,
      description,
      publishedAt,
      readingTime,
      image,
      body,
      author->{
        name,
        slug,
        photo,
        bio,
        age,
        grade,
        socials
      }
    }`);

    const url = `https://${PROJECT_ID}.api.sanity.io/v1/data/query/${DATASET}?query=${query}`;
    const res = await fetch(url);
    const data = await res.json();
    const post = data.result;

    if (!post) throw new Error("Post not found.");

    const author = post.author;

    let html = `
      <h1 class="text-4xl font-bold text-pink-700">${post.title}</h1>
      <p class="text-sm text-gray-500 mt-2">
        By <a href="../author?id=${author.slug.current}" class="text-pink-600 underline hover:text-pink-800">${author.name}</a> • ${new Date(post.publishedAt).toLocaleDateString()}
      </p>
      ${post.image ? `<img src="${urlFor(post.image)}" alt="${post.title}" class="w-full mt-6 rounded-lg shadow-md border border-pink-300" onerror="this.src='../images/default-blog.png'"/>` : ''}
      <div class="mt-6 space-y-6">
    `;

    // Render Portable Text body
    post.body.forEach(block => {
      if (block._type === 'block') {
        const text = block.children.map(child => {
          let txt = child.text;
          if (child.marks?.length) {
            child.marks.forEach(mark => {
              if (mark === "strong") txt = `<strong>${txt}</strong>`;
              if (mark === "em") txt = `<em>${txt}</em>`;
              const markDef = block.markDefs?.find(def => def._key === mark && def.href);
              if (markDef) txt = `<a href="${markDef.href}" class="text-pink-600 underline hover:text-pink-800">${txt}</a>`;
            });
          }
          return txt;
        }).join("");

        if (block.style === 'h2') html += `<h2 class="text-2xl font-semibold mt-8 text-gray-900">${text}</h2>`;
        else html += `<p class="leading-relaxed text-gray-800">${text}</p>`;
      } else if (block._type === 'image') {
        html += `<img src="${urlFor(block.asset)}" alt="${block.alt || ''}" class="w-full mt-6 rounded-lg shadow-md border border-pink-300" onerror="this.src='../images/default-blog.png'"/>`;
      }
    });

    html += `</div>`;

    // Author section
    if (author) {
      const photoHTML = author.photo ? `<div class="flex-shrink-0"><img src="${urlFor(author.photo)}" alt="${author.name}" class="w-40 h-auto object-contain rounded-xl shadow-md border border-pink-300" onerror="this.src='../images/default-author.png'"/></div>` : "";

      html += `
        <section class="mt-16 border-t border-gray-200 pt-8 flex flex-col md:flex-row items-center gap-8">
          ${photoHTML}
          <div class="flex-1">
            <p class="text-lg font-semibold text-pink-700">
              <a href="../author?id=${author.slug.current}" class="text-pink-600 underline hover:text-pink-800">${author.name}</a> • Age ${author.age}, Grade ${author.grade}
            </p>
            <p class="text-gray-700 mt-3 leading-relaxed">${author.bio}</p>
            ${author.interests?.length ? `<p class="mt-3 text-sm text-gray-600"><strong>Interests:</strong> ${author.interests.join(", ")}</p>` : ''}
            ${author.socials?.instagram ? `<p class="mt-4"><a href="${author.socials.instagram}" target="_blank" class="text-pink-600 underline hover:text-pink-800">Instagram</a></p>` : ''}
          </div>
        </section>
      `;
    }

    container.innerHTML = html;

  } catch(err) {
    console.error(err);
    container.innerHTML = `<p class="text-red-500">Error: ${err.message}</p>`;
  }
}

loadBlogPost();
</script>
